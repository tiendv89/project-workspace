    review_comment: >
      Approved — 5 scenarios defined (S1 claim, S2 complete, S3 done, S4 block,
      S5 recovery). Branch naming canonical: feature/<feature-id>/T<n>. PR opens
      at claim time. All commits on same branch. Pull-before-claim required.
      Branch-exists edge cases handled. S3 human-driven; todo→ready propagation
      automatic. S5 PR inheritance with -<attempt> fallback. Scope confirmed:
      management repo only.
